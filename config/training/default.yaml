training:
  run_name: "run"
  cache_name: "osuformer-v1"
  cache_preload: false

  batch_size: 16
  grad_accum_steps: 2
  learning_rate: 3.0e-4
  warmup_steps: 2000
  max_steps: 200000
  grad_clip: 1.0
  weight_decay: 0.1

  save_every_steps: 2000
  log_every_steps: 50
  val_every_steps: 2000
  keep_last_n_checkpoints: 3
  keep_best_checkpoint: true
  best_metric: "val_loss"

  num_workers: 4
  prefetch_factor: 4
  pin_memory: true

  precision: "bf16"
  seed: 42
  resume: true

  history_event_count: 256
  max_decoder_len: 3072

  lr_scheduler:
    enabled: true
    type: "cosine"
    min_lr: 1.0e-6
