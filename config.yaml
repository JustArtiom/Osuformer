data:
  sample_rate: 22050
  hop_ms: 10
  win_ms: 25
  n_mels: 80
  n_fft: 1024
  ticks_per_beat: 4
  beats_per_sample: 16
  sample_hop_beats: 16
  osu_width: 512
  osu_height: 384
  position_bin_size: 8
  use_bpm_feature: true
  bpm_normalization: 300.0
  use_rms_feature: true
  max_delta_ticks: null
  distance_bin_size: 8.0
  max_distance: null
  angle_bins: 72
  prep_num_workers: 4
  max_frames_per_sample: 4096
  normalize_audio: true
  skip_empty_chunks: true
  default_bpm: 120.0
  merge_tolerance_ms: 8.0
  tick_tolerance_ms: 10.0
  max_slider_ticks: 64
  slider_sv_precision: 100
  slider_sv_max: 4.0
  max_slides: 4
  max_slider_control_points: 2
  slider_curve_types: ["L", "B", "P", "C"]
  max_editor_bookmarks: 256
  bookmark_mode: "chunk"  # chunk|events|none
  time_rounding_mode: "round"  # round|floor|ceil|custom
  time_rounding_threshold: 0.55  # used when mode=custom
  slider_length_rounding_mode: "exact"  # exact|round|floor|ceil|custom
  slider_length_rounding_threshold: 0.6 # used when mode=custom
  suppress_overlap: true
  class_weights:
    empty_type: 0.9
    circle_type: 1.05
    slider_type: 1.05

filters:
  min_bpm: 80
  max_bpm: 300
  min_star_rating: 5
  max_star_rating: 7.5
  min_rating: 6.5
  max_rating: null
  require_constant_bpm: true
  require_tick_alignment: true
  map_types: []
  map_type_thresholds:
    stream_interval_ms: 110.0
    stream_ratio: 0.35
    stream_gap_distance: 80.0
    aim_jump_distance: 120.0
    aim_ratio: 0.3

model:
  encoder:
    type: conformer
    d_model: 512
    num_layers: 17
    num_heads: 8
    ffn_dim: 2048
    conv_kernel: 31
    dropout: 0.1
  decoder:
    num_layers: 8
    num_heads: 8
    ffn_dim: 2048
    dropout: 0.1

training:
  batch_size: 12
  lr: 0.00001
  num_epochs: 300
  device: "cuda"
  path: "checkpoints/"
  val_split: 0.2
  num_workers: 5
  weight_decay: 0.0001
  grad_clip: 1.0
  use_amp: true
  spatial_loss_weight: 0.1

paths:
  data: "dataset"
  include: ["*.osu", "*.wav", "*.mp3", "*.ogg", "*.flac"]
  exclude: ["_*", ]
