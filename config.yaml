data:
  sample_rate: 22050
  hop_ms: 10
  win_ms: 25
  n_mels: 80
  n_fft: 1024
  ticks_per_beat: 48
  osu_width: 128
  osu_height: 96

model:
  encoder:
    type: conformer
    d_model: 256
    num_layers: 6
    num_heads: 4
    ffn_dim: 512
    conv_kernel: 31
  decoder:
    num_layers: 6
    num_heads: 4
    ffn_dim: 512

training:
  batch_size: 8
  lr: 0.0003
  num_epochs: 100
  device: "cpu"
  path: "checkpoints/"

paths:
  data: "dataset/raw/"
  include: ["*.osu", "*.wav", "*.mp3", "*.ogg", "*.flac"]
  exclude: ["_*", ]