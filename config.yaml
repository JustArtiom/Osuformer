data:
  sample_rate: 22050
  hop_ms: 10
  win_ms: 25
  n_mels: 80
  n_fft: 1024
  ticks_per_beat: 8
  beats_per_sample: 16
  sample_hop_beats: 8
  osu_width: 512
  osu_height: 384
  prep_num_workers: 4
  max_frames_per_sample: 4096
  min_bpm: 80
  max_bpm: null
  normalize_audio: true
  skip_empty_chunks: false
  default_bpm: 120.0
  merge_tolerance_ms: 8.0
  map_types: [aim]
  map_type_thresholds:
    stream_interval_ms: 110.0
    stream_ratio: 0.35
    stream_gap_distance: 80.0
    aim_jump_distance: 120.0
    aim_ratio: 0.3
  min_star_rating: 6
  max_star_rating: 7
  eos_ramp_steps: 4

model:
  encoder:
    type: conformer
    d_model: 256
    num_layers: 6
    num_heads: 4
    ffn_dim: 512
    conv_kernel: 31
    dropout: 0.1
  decoder:
    num_layers: 6
    num_heads: 4
    ffn_dim: 512
    dropout: 0.1
    max_seq_len: 128

training:
  batch_size: 12
  lr: 0.0001
  num_epochs: 100
  device: "cuda"
  path: "checkpoints/"
  val_split: 0.2
  num_workers: 5
  weight_decay: 0.0001
  eos_loss_weight: 2.0
  grad_clip: 1.0
  use_amp: true
  lr_schedule:
    type: "multistep"
    milestones: [30]
    gamma: 0.3

paths:
  data: "dataset"
  include: ["*.osu", "*.wav", "*.mp3", "*.ogg", "*.flac"]
  exclude: ["_*", ]
