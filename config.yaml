training:
  batch_size: 64
  lr: 0.0001
  num_epochs: 300
  device: "cuda"
  path: "checkpoints/"
  val_split: 0.2
  num_workers: 0
  weight_decay: 0.001
  grad_clip: 1.0
  use_amp: true
  loss_penalties:
    object_tick_weight: 1.0
    duplicate_tick_weight: 0.7
    circle_in_slider_weight: 0.7
    coord_distance_weight: 1.0
    coord_angle_weight: 1.0
    slider_path_weight: 1.0
    density_weight: 0.7
    type_mismatch_weight: 0.7
    slider_duration_weight: 1.0
    curve_type_weight: 1.0
    slider_sv_weight: 1.0
    overlap_weight: 0.5
    event_recall_weight: 0.3
    eos_overuse_weight: 0.1

audio:
  sample_rate: 22050
  hop_ms: 10
  win_ms: 25
  n_mels: 80
  n_fft: 1024
  max_frames_per_sample: 4096
  normalize_audio: true
  skip_empty_chunks: true

data:
  ticks_per_beat: 4
  context_beats: 8
  target_beats: 16
  sample_hop_beats: 16
  osu_width: 512
  osu_height: 384
  position_bin_size: 8
  max_slider_ticks: 64
  max_slides: 12
  slider_sv_precision: 100
  slider_sv_max: 4.0
  slider_curve_types: ["L", "B", "P", "C"]
  default_bpm: 120.0
  merge_tolerance_ms: 8.0
  tick_tolerance_ms: 10.0
  suppress_overlap: false
  bookmark_mode: "chunk"
  max_editor_bookmarks: 512
  time_rounding_mode: "round"
  time_rounding_threshold: 0.55
  slider_length_rounding_mode: "exact"
  slider_length_rounding_threshold: 0.6
  prep_num_workers: 1
  use_ram_for_spec: true

filters:
  min_bpm: 80
  max_bpm: 300
  min_star_rating: 5.0
  max_star_rating: 6.0
  min_rating: null
  max_rating: null
  require_constant_bpm: true
  require_tick_alignment: true
  map_types: []
  map_type_thresholds:
    stream_interval_ms: 110.0
    stream_ratio: 0.35
    stream_gap_distance: 80.0
    aim_jump_distance: 120.0
    aim_ratio: 0.3

model:
  encoder:
    type: conformer
    d_model: 512
    num_layers: 17
    num_heads: 8
    ffn_dim: 2048
    conv_kernel: 31
    dropout: 0.1
    subsampling: true
    positional_encoding: "relative"  # absolute|relative
    relative_style: "transformer_xl"  # bias|transformer_xl
    relative_max_position: 128
  decoder:
    num_layers: 8
    num_heads: 8
    ffn_dim: 2048
    dropout: 0.1
    positional_encoding: "relative"
    relative_style: "transformer_xl"
    relative_max_position: 128
    norm_first: true

paths:
  data: "/beegfs/general/ac23acn/dataset"
  include: ["*.osu", "*.wav", "*.mp3", "*.ogg", "*.flac"]
  exclude: ["_*"]
