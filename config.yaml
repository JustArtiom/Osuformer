data:
  sample_rate: 22050
  hop_ms: 10
  win_ms: 25
  n_mels: 80
  n_fft: 1024
  ticks_per_beat: 8
  beats_per_sample: 16
  sample_hop_beats: 8
  osu_width: 512
  osu_height: 384
  prep_num_workers: 4
  max_frames_per_sample: 4096
  min_bpm: 80
  max_bpm: null
  normalize_audio: true
  skip_empty_chunks: true
  default_bpm: 120.0
  merge_tolerance_ms: 8.0
  min_star_rating: 5.5
  max_star_rating: 7.5

model:
  encoder:
    type: conformer
    d_model: 256
    num_layers: 6
    num_heads: 4
    ffn_dim: 512
    conv_kernel: 31
    dropout: 0.1
  decoder:
    num_layers: 6
    num_heads: 4
    ffn_dim: 512
    dropout: 0.1
    max_seq_len: 64

training:
  batch_size: 16
  lr: 0.0003
  num_epochs: 100
  device: "cuda"
  path: "checkpoints/"
  val_split: 0.2
  num_workers: 5
  weight_decay: 0.01
  eos_loss_weight: 1.0
  grad_clip: 1.0

paths:
  data: "dataset"
  include: ["*.osu", "*.wav", "*.mp3", "*.ogg", "*.flac"]
  exclude: ["_*", ]
