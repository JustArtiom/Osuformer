model:
  encoder:
    type: conformer
    d_model: 128
    num_layers: 16
    num_heads: 4
    ffn_dim: 512
    conv_kernel: 31
    dropout: 0.1
  decoder:
    num_layers: 6
    num_heads: 4
    ffn_dim: 512
    dropout: 0.1

training:
  batch_size: 8
  lr: 0.00001
  num_epochs: 300
  device: "cuda"
  path: "checkpoints/"
  val_split: 0.2
  num_workers: 1
  weight_decay: 0.0001
  grad_clip: 1.0
  use_amp: true
  distributed:
    enabled: false
    backend: "nccl"

audio:
  sample_rate: 22050
  hop_ms: 10
  win_ms: 25
  n_mels: 80
  n_fft: 1024
  max_frames_per_sample: 4096
  normalize_audio: true
  skip_empty_chunks: true

data:
  ticks_per_beat: 4
  context_beats: 8
  target_beats: 16
  sample_hop_beats: 16
  osu_width: 512
  osu_height: 384
  position_bin_size: 8
  max_slider_ticks: 64
  max_slides: 12
  slider_sv_precision: 100
  slider_sv_max: 4.0
  slider_curve_types: ["L", "B", "P", "C"]
  default_bpm: 120.0
  merge_tolerance_ms: 8.0
  tick_tolerance_ms: 10.0
  suppress_overlap: true
  bookmark_mode: "chunk"
  max_editor_bookmarks: 512
  time_rounding_mode: "round"
  time_rounding_threshold: 0.55
  slider_length_rounding_mode: "exact"
  slider_length_rounding_threshold: 0.6
  prep_num_workers: 1
  class_weights:
    empty_type: 0.9
    circle_type: 1.05
    slider_type: 1.05

filters:
  min_bpm: 80
  max_bpm: 300
  min_star_rating: 3
  max_star_rating: 3.5
  min_rating: null
  max_rating: null
  require_constant_bpm: true
  require_tick_alignment: true
  map_types: []
  map_type_thresholds:
    stream_interval_ms: 110.0
    stream_ratio: 0.35
    stream_gap_distance: 80.0
    aim_jump_distance: 120.0
    aim_ratio: 0.3

paths:
  data: "dataset"
  include: ["*.osu", "*.wav", "*.mp3", "*.ogg", "*.flac"]
  exclude: ["_*"]
